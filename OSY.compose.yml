services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: osy
      POSTGRES_PASSWORD: osy
      POSTGRES_DB: osymandias
    ports:
      - "5432:5432"
    volumes:
      - osy_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - osy_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - osy_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - osy_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  osy_postgres:
  osy_redis:
  osy_rabbitmq:
  osy_qdrant:
