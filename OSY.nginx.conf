server {
    listen 80;
    root /usr/share/nginx/html;
    charset utf-8;

    # SSE — must come before the generic /api/ block
    location ~ ^/api/v1/jobs/.+/events {
        proxy_pass http://host.docker.internal:47760;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API proxy → FastAPI (local)
    location /api/ {
        proxy_pass http://host.docker.internal:47760/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://host.docker.internal:47760/health;
    }

    # SPA — Next.js static export: /agents → agents.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
